name: mine_safety_app
description: "Mine safety hazard alert system for Erdenet Mining Corporation"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.2
  http: ^1.6.0
  record: ^7.1.1
  path_provider: ^2.1.6
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#B71C1C"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true